name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  macos-tests:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Voxt.xcodeproj

      - name: Run tests
        run: xcodebuild test -project Voxt.xcodeproj -scheme Voxt -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
