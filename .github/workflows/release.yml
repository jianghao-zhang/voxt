name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode (preferred 16.4)
        id: setup_xcode_preferred
        uses: maxim-lobanov/setup-xcode@v1
        continue-on-error: true
        with:
          xcode-version: 16.4

      - name: Setup Xcode (latest stable fallback)
        id: setup_xcode_latest
        uses: maxim-lobanov/setup-xcode@v1
        continue-on-error: true
        with:
          xcode-version: latest-stable

      - name: Discover Swift 6.2+ Xcode
        id: discover_xcode
        run: |
          set -euo pipefail
          shopt -s nullglob
          candidates=(/Applications/Xcode*.app /Applications/Xcode.app)
          if [ ${#candidates[@]} -eq 0 ]; then
            echo "No Xcode applications found in /Applications."
            exit 1
          fi

          best_path=""
          best_version=""
          best_score=-1

          extract_swift_version() {
            local bin_path="$1"
            local version_line
            version_line="$("${bin_path}" --version 2>/dev/null || true)"
            grep -oE '[0-9]+\\.[0-9]+' <<<"${version_line}" | head -n 1 || true
          }

          echo "==> Scanning installed Xcode candidates"
          for candidate in "${candidates[@]}"; do
            swift_bin="${candidate}/Contents/Developer/usr/bin/swift"
            if [[ ! -x "${swift_bin}" ]]; then
              continue
            fi

            swift_version="$(extract_swift_version "${swift_bin}")"
            if [[ -z "${swift_version}" ]]; then
              echo "candidate: ${candidate} -> unable to parse swift version from: $("${swift_bin}" --version)"
              continue
            fi

            IFS='.' read -r major minor _ <<< "${swift_version}"
            if [[ ! "${major}" =~ ^[0-9]+$ || ! "${minor}" =~ ^[0-9]+$ ]]; then
              continue
            fi

            if (( major > 6 || (major == 6 && minor >= 2) || major >= 7 )); then
              score=$((major * 10000 + minor * 100))
              echo "candidate: ${candidate} -> Swift ${swift_version}"
              if (( score > best_score )); then
                best_score="${score}"
                best_path="${candidate}"
                best_version="${swift_version}"
              fi
            else
              echo "candidate: ${candidate} -> Swift ${swift_version} (below 6.2, ignored)"
            fi
          done

          if [[ -z "${best_path}" ]]; then
            echo "No Swift 6.2+ Xcode found."
            echo "Installed Xcode apps:"
            ls -1 /Applications | rg '^Xcode' || true
            exit 1
          fi

          echo "SELECTED_XCODE_PATH=${best_path}" >> "${GITHUB_ENV}"
          echo "Selected Xcode: ${best_path} (${best_version})"
          echo "Selected Xcode path: ${best_path}" >> "${GITHUB_OUTPUT}"

      - name: Apply selected Xcode and show version
        run: |
          if [[ -z "${SELECTED_XCODE_PATH:-}" ]]; then
            echo "No Xcode path selected."
            exit 1
          fi
          sudo xcode-select -s "${SELECTED_XCODE_PATH}/Contents/Developer"
          echo "xcode-select: $(xcode-select -p)"
          xcodebuild -version
          swift --version

      - name: Validate Swift tools version
        run: |
          SWIFT_VERSION="$(swift --version | grep -oE '[0-9]+\\.[0-9]+' | head -n 1 || true)"
          if [[ -z "${SWIFT_VERSION}" ]]; then
            echo "Unable to parse Swift version from swift --version."
            exit 1
          fi
          if [[ "$SWIFT_VERSION" != 6.2* && "$SWIFT_VERSION" != 6.3* && "$SWIFT_VERSION" != 6.4* && "$SWIFT_VERSION" != 7.* ]]; then
            echo "Swift tools version is ${SWIFT_VERSION}, but at least 6.2 is required for mlx-audio-swift."
            echo "Installed Xcode path: $(xcode-select -p)"
            exit 1
          fi

      - name: Resolve version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME:-manual}"
          if [[ "$RAW" == v* ]]; then
            echo "value=${RAW#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${RAW}" >> "$GITHUB_OUTPUT"
          fi

      - name: Make scripts executable
        run: |
          chmod +x scripts/release/build_release.sh
          chmod +x scripts/release/publish_manifest.sh

      - name: Build release artifacts
        env:
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Voxt-${{ steps.version.outputs.value }}.pkg
          RELEASE_NOTES: See CHANGELOG.md for details.
        run: |
          scripts/release/build_release.sh "${{ steps.version.outputs.value }}"

      - name: Publish appcast to repo tree
        run: |
          scripts/release/publish_manifest.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxt-release-${{ steps.version.outputs.value }}
          path: |
            build/release/artifacts/*.zip
            build/release/artifacts/*.pkg
            build/release/artifacts/appcast.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/release/artifacts/*.zip
            build/release/artifacts/*.pkg
            build/release/artifacts/appcast.json
          body_path: CHANGELOG.md
